<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Reisetagebuch · M-Reisen</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&family=Caveat:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ocean:#1a6b8a;--reef:#0d9488;--sand:#f0e6cc;--sunset:#e07b3f;
  --bush:#5a7a40;--paper:#faf7f2;--ink:#1c1a16;--fog:#7a7167;
  --white:#fff;--radius:14px;--shadow:0 4px 28px rgba(28,26,22,.10);
  --flight:#7c3aed;--bus:#16a34a;--car:#b45309;--tour:#be185d;--ferry:#0369a1;
}
body{background:var(--paper);color:var(--ink);font-family:'Inter',sans-serif;font-weight:300;min-height:100vh;}

/* HEADER */
header{background:var(--ink);position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.35);}
.header-inner{max-width:1140px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:13px 24px;gap:16px;}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.logo .mark{font-size:1.9rem;line-height:1;}
.logo .txt{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--sand);}
.logo .txt em{color:var(--sunset);font-style:italic;}
.header-actions{display:flex;gap:8px;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:8px;font-family:'Inter',sans-serif;font-size:.82rem;font-weight:500;cursor:pointer;border:none;transition:all .18s;text-decoration:none;}
.btn-primary{background:var(--sunset);color:var(--white);}.btn-primary:hover{background:#c96a30;}
.btn-ghost{background:transparent;color:var(--sand);border:1px solid rgba(255,255,255,.22);}.btn-ghost:hover{background:rgba(255,255,255,.09);}
.btn-reef{background:var(--reef);color:var(--white);}
.btn-bush{background:var(--bush);color:var(--white);}
.btn-sm{padding:6px 12px;font-size:.76rem;}

/* HERO */
.hero{position:relative;overflow:hidden;background:radial-gradient(120% 130% at 50% -10%,#16314a 0%,#0d1f33 45%,#0a1626 100%);padding:48px 24px 40px;text-align:center;color:var(--sand);}
.hero-stars{position:absolute;inset:0;pointer-events:none;background-image:radial-gradient(1.5px 1.5px at 15% 20%,rgba(255,255,200,.7),transparent),radial-gradient(1px 1px at 60% 10%,rgba(255,255,200,.5),transparent),radial-gradient(1.5px 1.5px at 80% 30%,rgba(255,255,200,.6),transparent),radial-gradient(1px 1px at 30% 70%,rgba(255,255,200,.4),transparent);}
.hero-eyebrow{font-family:'Caveat',cursive;font-size:1.15rem;color:var(--sunset);margin-bottom:8px;position:relative;}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,6vw,3.2rem);font-weight:400;line-height:1.12;margin-bottom:10px;position:relative;}
.hero h1 em{color:var(--sunset);font-style:italic;}
.hero-dates{font-family:'Caveat',cursive;font-size:1.25rem;color:rgba(240,230,204,.7);margin-bottom:6px;position:relative;}
.hero-sub{font-size:.85rem;color:rgba(240,230,204,.5);margin-bottom:22px;position:relative;max-width:560px;margin-left:auto;margin-right:auto;line-height:1.5;}
.hero-stats{display:flex;justify-content:center;gap:26px;flex-wrap:wrap;position:relative;}
.hero-stat .num{font-family:'Playfair Display',serif;font-size:1.7rem;color:var(--sunset);display:block;line-height:1;}
.hero-stat .lbl{font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;color:rgba(240,230,204,.5);margin-top:5px;}
.hero-edit-btn{position:relative;margin-top:18px;}

/* TABS */
.tabs{max-width:1140px;margin:0 auto;padding:0 24px;display:flex;gap:4px;border-bottom:2px solid rgba(28,26,22,.1);overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab-btn{font-family:'Inter',sans-serif;font-size:.82rem;font-weight:500;color:var(--fog);background:none;border:none;padding:11px 16px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .18s;border-radius:6px 6px 0 0;white-space:nowrap;}
.tab-btn.active{color:var(--sunset);border-bottom-color:var(--sunset);}
.tab-btn:hover:not(.active){color:var(--ink);background:rgba(0,0,0,.04);}

main{max-width:1140px;margin:0 auto;padding:28px 24px 80px;}
.section{display:none;}
.section.active{display:block;}

/* EMPTY STATES */
.empty{text-align:center;padding:50px 20px;color:var(--fog);}
.empty .big{font-size:2.8rem;margin-bottom:12px;}
.empty .lbl{font-size:.95rem;margin-bottom:6px;color:var(--ink);font-family:'Playfair Display',serif;}
.empty .sub{font-size:.83rem;line-height:1.5;max-width:340px;margin:0 auto 16px;}

/* TAG FÜR TAG */
.days-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px;}
.days-nav-title{font-family:'Playfair Display',serif;font-size:1.15rem;text-align:center;flex:1;}
.days-nav-title small{display:block;font-family:'Inter',sans-serif;font-size:.75rem;color:var(--fog);font-weight:400;margin-top:2px;}
.nav-arrow{background:var(--white);border:1.5px solid rgba(28,26,22,.15);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.1rem;flex-shrink:0;transition:all .18s;box-shadow:var(--shadow);}
.nav-arrow:hover{background:var(--sunset);color:var(--white);border-color:var(--sunset);}
.nav-arrow:disabled{opacity:.3;cursor:default;}
.days-dots{display:flex;justify-content:center;gap:5px;margin-bottom:18px;flex-wrap:wrap;}
.day-dot{width:8px;height:8px;border-radius:50%;background:rgba(28,26,22,.15);cursor:pointer;transition:all .18s;}
.day-dot.active{background:var(--sunset);transform:scale(1.3);}
.day-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
.day-card-header{padding:18px 22px 14px;border-bottom:1px solid rgba(28,26,22,.07);}
.day-card-date{font-family:'Caveat',cursive;font-size:1.1rem;color:var(--sunset);}
.day-card-loc{font-size:.8rem;color:var(--fog);margin-top:2px;}
.day-entry-area{padding:18px 22px;}
.day-entry-text{font-size:.9rem;line-height:1.8;color:#3a2d22;white-space:pre-wrap;margin-bottom:12px;}
.day-entry-empty{font-size:.85rem;color:var(--fog);font-style:italic;margin-bottom:12px;}
.day-program{display:flex;flex-wrap:wrap;gap:6px;padding:12px 22px;background:rgba(28,26,22,.03);border-top:1px solid rgba(28,26,22,.06);}
.program-badge{font-size:.75rem;padding:4px 11px;border-radius:12px;font-weight:500;display:inline-flex;align-items:center;gap:4px;}
.badge-Unterkunft{background:#dbeafe;color:#1d4ed8;}
.badge-Flug{background:#ede9fe;color:#5b21b6;}
.badge-Transport{background:#fef3c7;color:#92400e;}
.badge-Ausflug{background:#fce7f3;color:#9d174d;}
.badge-Sonstiges{background:#e8f0e0;color:#3d5a26;}

/* COST */
.cost-card{background:var(--white);border-radius:var(--radius);padding:24px 28px;box-shadow:var(--shadow);max-width:720px;margin:0 auto;}
.cost-title{font-family:'Playfair Display',serif;font-size:1.3rem;margin-bottom:14px;}
.cost-section-title{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--fog);padding:14px 0 6px;border-top:1px solid rgba(28,26,22,.08);margin-top:6px;display:flex;align-items:center;gap:6px;}
.cost-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(28,26,22,.06);font-size:.85rem;gap:12px;}
.cost-row .info{font-size:.73rem;color:var(--fog);margin-top:1px;}
.cost-row .date-chip{display:inline-block;font-size:.68rem;background:#e8f0e0;color:#3d5a26;padding:1px 7px;border-radius:8px;margin-top:3px;}
.cost-group-total{display:flex;justify-content:space-between;font-weight:600;font-size:.85rem;padding:8px 0 4px;border-top:1px solid rgba(28,26,22,.15);margin-top:4px;}
.cost-edit-btn,.cost-del-btn{background:none;border:none;cursor:pointer;font-size:.8rem;padding:2px 4px;border-radius:5px;line-height:1;opacity:.65;transition:opacity .15s,background .15s;}
.cost-edit-btn:hover{opacity:1;background:rgba(28,26,22,.06);}
.cost-del-btn{color:#dc2626;}
.cost-del-btn:hover{opacity:1;background:#fef2f2;}
.cost-add-btn{display:block;width:100%;text-align:left;background:none;border:1.5px dashed rgba(28,26,22,.2);border-radius:8px;padding:7px 12px;margin:8px 0 4px;font-size:.78rem;color:var(--fog);cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;}
.cost-add-btn:hover{border-color:var(--sunset);color:var(--sunset);background:#fff8f4;}
.price-blur{filter:blur(5px);user-select:none;}
.grand-total{display:flex;justify-content:space-between;font-weight:700;font-size:1.05rem;padding:14px 0 0;border-top:2px solid var(--sunset);margin-top:10px;color:var(--sunset);}

/* MODALS (generic overlay) */
.overlay{display:none;position:fixed;inset:0;background:rgba(28,26,22,.7);z-index:500;align-items:center;justify-content:center;padding:20px;}
.overlay.open{display:flex;}
.modal{background:#fff;border-radius:16px;padding:24px 22px;max-width:400px;width:100%;box-shadow:0 24px 64px rgba(0,0,0,.3);max-height:92vh;overflow-y:auto;}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.modal-title{font-family:'Playfair Display',serif;font-size:1.15rem;}
.modal-close{background:none;border:none;font-size:1.25rem;cursor:pointer;color:var(--fog);line-height:1;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:.72rem;color:var(--fog);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;}
.field label .opt{text-transform:none;font-weight:400;}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;border:1.5px solid rgba(28,26,22,.15);border-radius:8px;font-family:'Inter',sans-serif;font-size:.88rem;color:var(--ink);background:var(--paper);outline:none;transition:border-color .16s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--sunset);background:#fff;}
.field textarea{resize:vertical;min-height:70px;}
.field-row{display:flex;gap:10px;}
.field-row>div{flex:1;}
.preview-line{font-size:.78rem;color:var(--sunset);text-align:right;min-height:16px;margin-bottom:8px;}
.modal-actions{display:flex;gap:10px;margin-top:6px;}
.modal-actions .cancel{flex:1;padding:10px;border:1.5px solid rgba(28,26,22,.2);border-radius:8px;background:none;cursor:pointer;color:var(--fog);font-family:'Inter',sans-serif;}
.modal-actions .save{flex:2;padding:10px;background:var(--sunset);border:none;border-radius:8px;color:#fff;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;}

/* PIN */
.pin-dots{display:flex;justify-content:center;gap:11px;margin:14px 0 16px;}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid rgba(28,26,22,.2);transition:all .16s;}
.pin-dot.filled{background:var(--sunset);border-color:var(--sunset);}
.pin-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:240px;margin:0 auto;}
.pin-key{background:var(--paper);border:1.5px solid rgba(28,26,22,.12);border-radius:10px;padding:14px;font-size:1.1rem;font-weight:500;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;}
.pin-key:hover{background:var(--sunset);color:#fff;border-color:var(--sunset);}
.pin-err{color:#dc2626;font-size:.77rem;margin-top:10px;min-height:16px;text-align:center;}

#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--sand);padding:10px 22px;border-radius:8px;font-size:.84rem;opacity:0;transition:all .3s;pointer-events:none;z-index:600;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* FOTOS */
.photo-strip{padding:14px 22px;border-bottom:1px solid rgba(28,26,22,.07);}
.photo-strip-label{font-size:.72rem;font-weight:500;color:var(--fog);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.photo-cell{position:relative;width:100%;padding-top:100%;border-radius:8px;overflow:hidden;background:#e8e0d4;}
.photo-cell img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;cursor:pointer;display:block;}
.photo-del{position:absolute;top:5px;right:5px;background:rgba(220,38,38,.88);color:#fff;border:none;border-radius:50%;width:24px;height:24px;font-size:.7rem;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;z-index:2;}
.photo-move{position:absolute;bottom:5px;background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:50%;width:24px;height:24px;font-size:.7rem;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;z-index:2;}
.photo-move-l{left:5px;}.photo-move-r{left:33px;}
.photo-cap-btn{position:absolute;top:5px;left:5px;background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:6px;padding:2px 6px;font-size:.62rem;cursor:pointer;z-index:2;}
.photo-cap{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.55);color:#fff;font-size:.6rem;padding:3px 5px;line-height:1.3;text-align:center;z-index:1;}
.photo-add{position:relative;padding-top:100%;border:2px dashed rgba(28,26,22,.2);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:.65rem;color:var(--fog);gap:2px;background:var(--paper);transition:all .15s;}
.photo-add:hover{border-color:var(--sunset);color:var(--sunset);background:#fff8f4;}
.photo-add>span{position:absolute;top:50%;left:0;right:0;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:2px;}
.photo-add>span:first-child{position:static;transform:none;}

/* LIGHTBOX */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.94);z-index:700;flex-direction:column;align-items:center;justify-content:center;}
.lightbox.open{display:flex;}
.lightbox img{max-width:94vw;max-height:78vh;object-fit:contain;border-radius:8px;}
.lb-top{position:absolute;top:14px;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:0 18px;color:#fff;}
.lb-counter{font-size:.82rem;color:rgba(255,255,255,.7);}
.lb-close{background:none;border:none;color:#fff;font-size:1.6rem;cursor:pointer;opacity:.85;}
.lb-arrow{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.12);border:none;color:#fff;width:44px;height:44px;border-radius:50%;font-size:1.3rem;cursor:pointer;}
.lb-arrow.prev{left:12px;}.lb-arrow.next{right:12px;}

/* TAGESAUSGABEN */
.day-exp-section{margin-top:14px;border-top:1px solid rgba(28,26,22,.08);padding-top:12px;}
.day-exp-title{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--fog);margin-bottom:8px;}
.exp-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(28,26,22,.05);font-size:.84rem;gap:8px;}
.exp-del{background:none;border:none;color:#dc2626;cursor:pointer;font-size:.78rem;padding:1px 4px;border-radius:4px;opacity:.7;}
.exp-del:hover{opacity:1;background:#fef2f2;}
.exp-total{display:flex;justify-content:space-between;font-weight:600;font-size:.85rem;padding-top:7px;margin-top:4px;border-top:1px solid rgba(28,26,22,.12);}
.exp-add{background:none;border:1.5px dashed rgba(28,26,22,.2);border-radius:8px;padding:6px 12px;font-size:.78rem;color:var(--fog);cursor:pointer;width:100%;text-align:left;margin-top:8px;font-family:'Inter',sans-serif;}
.exp-add:hover{border-color:var(--sunset);color:var(--sunset);background:#fff8f4;}

/* WECHSELKURSE */
.fx-box{background:#f0f6f5;border:1px solid rgba(13,148,136,.2);border-radius:10px;padding:12px 14px;margin-bottom:16px;}
.fx-title{font-size:.74rem;font-weight:600;color:var(--reef);margin-bottom:8px;}
.fx-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.fx-cur{font-weight:600;font-size:.82rem;width:40px;}
.fx-row input{flex:1;padding:6px 10px;border:1.5px solid rgba(28,26,22,.15);border-radius:7px;font-family:'Inter',sans-serif;font-size:.82rem;background:#fff;}
.fx-save{background:var(--reef);color:#fff;border:none;border-radius:7px;width:34px;height:32px;cursor:pointer;font-size:.85rem;}

@media(max-width:600px){
  .cost-card,.modal{padding:18px;}
  .hero{padding:34px 18px 30px;}
  .header-inner{padding:11px 16px;}
  .field-row{flex-direction:column;gap:12px;}
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="index.html">
      <span class="mark">🧳</span>
      <span class="txt"><em>M</em>-Reisen</span>
    </a>
    <div class="header-actions">
      <a class="btn btn-ghost btn-sm" href="index.html">← Übersicht</a>
      <button class="btn btn-ghost btn-sm" id="admin-btn" onclick="toggleAdmin()">🔑 Admin</button>
    </div>
  </div>
</header>

<div class="hero">
  <div class="hero-stars"></div>
  <div class="hero-eyebrow" id="hero-eyebrow">Neues Reisetagebuch</div>
  <h1 id="hero-title">Deine <em>Reise</em></h1>
  <div class="hero-dates" id="hero-dates"></div>
  <div class="hero-sub" id="hero-sub">Lege im Admin-Modus die Eckdaten an und erfasse deine Kosten mit Datum — daraus entsteht automatisch der Tagesplan.</div>
  <div class="hero-stats" id="hero-stats"></div>
  <div class="hero-edit-btn" id="hero-edit-wrap" style="display:none">
    <button class="btn btn-primary btn-sm" onclick="openTripHead()">✏️ Reise-Eckdaten bearbeiten</button>
  </div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('tage')" id="tab-tage">📅 Tag für Tag</button>
  <button class="tab-btn" onclick="showTab('kosten')" id="tab-kosten">💰 Kosten</button>
</div>

<main>
  <!-- TAG FÜR TAG -->
  <div class="section active" id="section-tage">
    <div id="tage-content"></div>
  </div>

  <!-- KOSTEN -->
  <div class="section" id="section-kosten">
    <div class="cost-card">
      <div class="cost-title">💰 Reisekosten</div>
      <div id="fx-settings"></div>
      <div id="cost-list"></div>
      <div id="grand-total-box"></div>
    </div>
  </div>
</main>

<!-- PIN -->
<div class="overlay" id="pin-overlay" onclick="if(event.target===this)closePin()">
  <div class="modal" style="max-width:300px;text-align:center;">
    <div style="font-size:1.8rem;margin-bottom:8px">🔑</div>
    <div class="modal-title" style="margin-bottom:4px">Admin-Modus</div>
    <div style="font-size:.8rem;color:var(--fog)">PIN eingeben</div>
    <div class="pin-dots">
      <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
    </div>
    <div class="pin-keypad">
      <button class="pin-key" onclick="pinIn('1')">1</button><button class="pin-key" onclick="pinIn('2')">2</button><button class="pin-key" onclick="pinIn('3')">3</button>
      <button class="pin-key" onclick="pinIn('4')">4</button><button class="pin-key" onclick="pinIn('5')">5</button><button class="pin-key" onclick="pinIn('6')">6</button>
      <button class="pin-key" onclick="pinIn('7')">7</button><button class="pin-key" onclick="pinIn('8')">8</button><button class="pin-key" onclick="pinIn('9')">9</button>
      <button class="pin-key" style="font-size:.85rem;color:var(--fog)" onclick="pinDel()">⌫</button>
      <button class="pin-key" onclick="pinIn('0')">0</button>
      <button class="pin-key" style="font-size:.78rem;color:var(--fog)" onclick="closePin()">✕</button>
    </div>
    <div class="pin-err" id="pin-err"></div>
  </div>
</div>

<!-- REISEKOPF-MODAL -->
<div class="overlay" id="head-modal" onclick="if(event.target===this)closeTripHead()">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">Reise-Eckdaten</div>
      <button class="modal-close" onclick="closeTripHead()">✕</button>
    </div>
    <div class="field"><label>Reisetitel</label><input type="text" id="h-title" placeholder="z.B. Japan im Frühling"></div>
    <div class="field"><label>Untertitel / Region <span class="opt">(optional)</span></label><input type="text" id="h-sub" placeholder="z.B. Tokio · Kyoto · Osaka"></div>
    <div class="field-row">
      <div class="field"><label>Von</label><input type="date" id="h-from"></div>
      <div class="field"><label>Bis</label><input type="date" id="h-to"></div>
    </div>
    <div class="field"><label>Emoji <span class="opt">(optional)</span></label><input type="text" id="h-emoji" placeholder="🌸" maxlength="4"></div>
    <div class="modal-actions">
      <button class="cancel" onclick="closeTripHead()">Abbrechen</button>

// ort=PFX+'kost_<uid>', name='cat|label', nachricht='amount|cur|datum|info'
async function sbSaveCost(c){
  const uid=PFX+'kost_'+Date.now()+Math.floor(Math.random()*1000);

    ort:uid, name:c.cat+'|'+c.label, nachricht:c.amount+'|'+c.cur+'|'+(c.datum||'')+'|'+(c.info||''),

  }).select();
  if(error){toast('Fehler beim Speichern: '+(error.message||''));return null;}

}
async function sbUpdateCost(c){
  const {error}=await sb.from('kommentare').update({
    name:c.cat+'|'+c.label, nachricht:c.amount+'|'+c.cur+'|'+(c.datum||'')+'|'+(c.info||'')
  }).eq('id',c.id);
  if(error){toast('Fehler beim Aktualisieren: '+(error.message||''));return false;}
  return true;
}
async function sbDeleteCost(id){
  const {error}=await sb.from('kommentare').delete().eq('id',id);
  return !error;
}
async function sbLoadCosts(){
  const {data,error}=await sb.from('kommentare').select('*').like('ort',PFX+'kost_%').order('created_at',{ascending:true});
  if(error){console.error('Kosten laden:',error);return;}
  costs=(data||[]).map(function(r){
    const np=(r.name||'').split('|');
    const cat=np[0]||'Sonstiges';
    const label=np.slice(1).join('|')||'Position';
    const mp=(r.nachricht||'').split('|');
    const amount=parseFloat(mp[0])||0;
    const cur=mp[1]||'EUR';
    let datum='',info='';
    if(mp.length>=4){datum=isISODate(mp[2])?mp[2]:'';info=mp.slice(3).join('|');if(!datum&&mp[2])info=mp.slice(2).join('|');}
    else if(mp.length===3){if(isISODate(mp[2]))datum=mp[2];else info=mp[2];}
    return {id:r.id,cat:cat,label:label,info:info,datum:datum,amount:amount,cur:cur};
  });
}

// ── SUPABASE: FOTOS (Storage-Bucket 'Reisefotos', Pfad <reise>/<datum>/) ──────
function photoFolder(iso){return REISE+'/'+iso;}
async function sbLoadPhotos(iso){
  const {data,error}=await sb.storage.from('Reisefotos').list(photoFolder(iso),{limit:100});
  if(error||!data)return[];
  return data.filter(f=>f.name!=='.emptyFolderPlaceholder').map(f=>{
    const {data:u}=sb.storage.from('Reisefotos').getPublicUrl(photoFolder(iso)+'/'+f.name);
    return u.publicUrl;
  });
}
async function sbUploadPhoto(iso,file){
  const ext=(file.name.split('.').pop()||'jpg').toLowerCase();
  const path=photoFolder(iso)+'/'+Date.now()+'_'+Math.floor(Math.random()*10000)+'.'+ext;
  const {error}=await sb.storage.from('Reisefotos').upload(path,file,{contentType:file.type||'image/jpeg'});
  if(error){console.error('Upload:',error);return null;}
  const {data}=sb.storage.from('Reisefotos').getPublicUrl(path);
  return data&&data.publicUrl?data.publicUrl:null;
}
async function sbDeletePhoto(url){
  const path=url.split('/Reisefotos/')[1];
  if(path)await sb.storage.from('Reisefotos').remove([decodeURIComponent(path)]);
}

// ── FOTO-META: Reihenfolge + Bildunterschriften (pro Tag, in Supabase) ────────
// ort=PFX+'photometa_<iso>', nachricht=JSON {order:[...], captions:{url:text}}
async function sbLoadPhotoMeta(){
  const {data,error}=await sb.from('kommentare').select('*').like('ort',PFX+'photometa_%');
  if(error){console.error('PhotoMeta laden:',error);return;}
  photoMeta={};
  (data||[]).forEach(function(r){
    const iso=r.ort.substring((PFX+'photometa_').length);
    try{photoMeta[iso]=JSON.parse(r.nachricht||'{}');}catch(e){photoMeta[iso]={};}
    if(!photoMeta[iso].order)photoMeta[iso].order=[];
    if(!photoMeta[iso].captions)photoMeta[iso].captions={};
  });
}
async function sbSavePhotoMeta(iso){
  const key=PFX+'photometa_'+iso;
  const payload=JSON.stringify(photoMeta[iso]||{order:[],captions:{}});
  try{
    const {data}=await sb.from('kommentare').select('id').eq('ort',key).limit(1);
    if(data&&data.length){
      await sb.from('kommentare').update({nachricht:payload}).eq('id',data[0].id);
    }else{
      await sb.from('kommentare').insert({ort:key,name:'PhotoMeta',nachricht:payload,created_at:new Date().toISOString()});
    }
  }catch(e){console.error('PhotoMeta speichern:',e);}
}
// Fotos in gespeicherter Reihenfolge zurückgeben (neue ans Ende)
function orderedPhotos(iso,loaded){
  const meta=photoMeta[iso];
  if(!meta||!meta.order||!meta.order.length)return loaded;
  const inOrder=meta.order.filter(u=>loaded.includes(u));
  const newOnes=loaded.filter(u=>!inOrder.includes(u));
  return inOrder.concat(newOnes);
}
function captionFor(iso,url){
  const meta=photoMeta[iso];
  return (meta&&meta.captions&&meta.captions[url])||'';
}

// ── REISEKOPF UI ──────────────────────────────────────────────────────────────
function renderHead(){
  document.getElementById('hero-title').innerHTML = tripHead.title
    ? (tripHead.emoji?tripHead.emoji+' ':'')+esc(tripHead.title)
    : 'Deine <em>Reise</em>';
  document.getElementById('hero-eyebrow').textContent = tripHead.sub || 'Reisetagebuch';
  // Datum
  let dateStr='';
  if(tripHead.from){
    const f=new Date(tripHead.from+'T12:00:00');
    if(tripHead.to){
      const t=new Date(tripHead.to+'T12:00:00');
      dateStr=f.toLocaleDateString('de-DE',{day:'numeric',month:'long'})+' – '+t.toLocaleDateString('de-DE',{day:'numeric',month:'long',year:'numeric'});
    }else{
      dateStr=f.toLocaleDateString('de-DE',{day:'numeric',month:'long',year:'numeric'});
    }
  }
  document.getElementById('hero-dates').textContent=dateStr;
  // Sub-Hinweis ausblenden sobald Titel da ist
  document.getElementById('hero-sub').style.display = tripHead.title ? 'none' : 'block';
  // Stats
  const days=buildDays();
  const stations=new Set(costs.filter(c=>c.cat==='Unterkunft').map(c=>c.label)).size;
  const total=costs.reduce((s,c)=>s+toEUR(c.amount,c.cur),0);
  let stats='';
  if(days.length){stats+=`<div class="hero-stat"><span class="num">${days.length}</span><span class="lbl">Tage</span></div>`;}
  if(stations){stats+=`<div class="hero-stat"><span class="num">${stations}</span><span class="lbl">Unterkünfte</span></div>`;}
  if(costs.length){stats+=`<div class="hero-stat"><span class="num">${costs.length}</span><span class="lbl">Positionen</span></div>`;}
  document.getElementById('hero-stats').innerHTML=stats;
  document.getElementById('hero-edit-wrap').style.display=editMode?'block':'none';
}

  setVal('h-from',tripHead.from);setVal('h-to',tripHead.to);setVal('h-emoji',tripHead.emoji==='🌍'?'':tripHead.emoji);
  document.getElementById('head-modal').classList.add('open');
}

  const title=val('h-title').trim();

  const from=val('h-from'),to=val('h-to');
  if(from&&to&&to<from){toast('„Bis" liegt vor „Von".');return;}
  tripHead={title:title, sub:val('h-sub').trim(), from:from, to:to, emoji:val('h-emoji').trim()||'🌍'};
  await sbSaveHead();
  closeTripHead();
  renderHead();buildDaySlides();
  toast('Eckdaten gespeichert!');
}

// ── TAGE: aus Reisezeitraum ODER aus datierten Kosten ─────────────────────────
function buildDays(){
  // Primär: Reisezeitraum aus tripHead. Fallback: min/max der datierten Kosten.
  let from=tripHead.from, to=tripHead.to;
  const dated=costs.filter(c=>c.datum).map(c=>c.datum).sort();
  if(!from && dated.length) from=dated[0];
  if(!to && dated.length) to=dated[dated.length-1];
  if(!from) return [];
  if(!to) to=from;
  const days=[];
  const start=new Date(from+'T12:00:00'), end=new Date(to+'T12:00:00');
  if(end<start) return [];
  for(let d=new Date(start); d<=end; d.setDate(d.getDate()+1)){
    days.push(d.toISOString().split('T')[0]);
  }
  return days;
}

function renderTage(){
  const days=buildDays();
  const c=document.getElementById('tage-content');
  if(!days.length){
    c.innerHTML='<div class="empty"><div class="big">🗺️</div><div class="lbl">Noch kein Tagesplan</div>'
      +'<div class="sub">Lege im Admin-Modus die Reise-Eckdaten an oder erfasse Kosten mit einem Datum — daraus entsteht hier automatisch der Tagesplan.</div>'
      +(editMode?'<button class="btn btn-primary btn-sm" onclick="openTripHead()">✏️ Eckdaten anlegen</button>':'')+'</div>';
    return;
  }
  if(currentDay>=days.length)currentDay=days.length-1;
  if(currentDay<0)currentDay=0;
  c.innerHTML=
    '<div class="days-nav">'
    +'<button class="nav-arrow" id="btn-prev" onclick="slideDay(-1)">←</button>'
    +'<div class="days-nav-title" id="day-nav-title"></div>'
    +'<button class="nav-arrow" id="btn-next" onclick="slideDay(1)">→</button>'
    +'</div>'
    +'<div class="days-dots" id="days-dots"></div>'
    +'<div id="day-card-wrap"></div>';
  // dots
  let dots='';
  days.forEach(function(iso,i){dots+=`<div class="day-dot${i===currentDay?' active':''}" onclick="goToDay(${i})"></div>`;});
  document.getElementById('days-dots').innerHTML=dots;
  renderDayCard(days);
}
function renderDayCard(days){
  const iso=days[currentDay];
  const d=new Date(iso+'T12:00:00');
  const dateLabel=d.toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  // Programmpunkte = datierte Kosten dieses Tages
  const dayCosts=costs.filter(c=>c.datum===iso);
  const stay=dayCosts.find(c=>c.cat==='Unterkunft');
  const loc=stay?stay.label:(dayCosts.length?'Programm':'–');
  const badges=dayCosts.map(c=>`<span class="program-badge badge-${c.cat}">${CAT_EMOJI[c.cat]||'•'} ${esc(c.label.split('·')[0].trim())}</span>`).join('');
  document.getElementById('day-nav-title').innerHTML=`Tag ${currentDay+1} von ${days.length}<small>${d.toLocaleDateString('de-DE',{weekday:'short',day:'numeric',month:'long'})}</small>`;
  document.getElementById('btn-prev').disabled=currentDay===0;
  document.getElementById('btn-next').disabled=currentDay===days.length-1;

  // ── Fotos ──
  let photoHTML='';
  if(photos[iso]===undefined){
    photoHTML='<div style="font-size:.78rem;color:var(--fog);padding:4px 0">⏳ Fotos werden geladen…</div>';
    // asynchron laden, in gespeicherte Reihenfolge bringen, danach neu rendern
    sbLoadPhotos(iso).then(function(list){photos[iso]=orderedPhotos(iso,list);if(buildDays()[currentDay]===iso)renderDayCard(days);}).catch(function(){photos[iso]=[];});
  }else{
    const arr=photos[iso]||[];
    let cells=arr.map(function(url,pi){
      const cap=captionFor(iso,url);
      let html='<div class="photo-cell">'
        +'<img src="'+url+'" onclick="openLightbox(\''+iso+'\','+pi+')" alt="Foto">';
      if(editMode){
        html+='<button class="photo-del" onclick="delPhoto(\''+iso+'\','+pi+')">✕</button>';
        if(pi>0)html+='<button class="photo-move photo-move-l" onclick="movePhoto(\''+iso+'\','+pi+',-1)">◀</button>';
        if(pi<arr.length-1)html+='<button class="photo-move photo-move-r" onclick="movePhoto(\''+iso+'\','+pi+',1)">▶</button>';
        html+='<button class="photo-cap-btn" onclick="openCaption(\''+iso+'\','+pi+')">✏️</button>';
      }
      if(cap)html+='<div class="photo-cap">'+esc(cap)+'</div>';
      html+='</div>';
      return html;
    }).join('');
    const addCell=editMode
      ?'<label class="photo-add"><span style="font-size:1.4rem">📷</span><span>Foto</span><input type="file" accept="image/*" multiple style="display:none" onchange="handlePhotos(event,\''+iso+'\')"></label>'
      :'';
    if(arr.length||editMode){
      photoHTML='<div class="photo-grid">'+cells+addCell+'</div>';
    }
  }

  // ── Tagebucheintrag ──
  const entry=entries[iso];
  let entryHTML;
  if(entry&&entry.text){
    entryHTML='<div class="day-entry-text">'+esc(entry.text)+'</div>'
      +(editMode?'<button class="btn btn-ghost btn-sm" style="color:var(--fog);border-color:rgba(0,0,0,.18)" onclick="openEntry(\''+iso+'\')">✏️ Bearbeiten</button>':'');
  }else{
    entryHTML='<div class="day-entry-empty">Noch kein Tagebucheintrag für diesen Tag.</div>'
      +(editMode?'<button class="btn btn-primary btn-sm" onclick="openEntry(\''+iso+'\')">✍️ Eintrag schreiben</button>':'');
  }

  // ── Tagesausgaben vor Ort ──
  const exps=dayExpenses[iso]||[];
  let expHTML='';
  if(exps.length||editMode){
    let rows=exps.map(function(e,ei){
      const amtStr=(e.cur!=='EUR')?`${fmt(e.amount)} ${e.cur}`:`EUR ${fmt(e.amount)}`;
      const del=editMode?`<button class="exp-del" onclick="delExpense('${iso}',${ei})">✕</button>`:'';
      return `<div class="exp-row"><span>${e.cat} ${esc(e.label)}</span><span style="display:flex;align-items:center;gap:6px"><span>${amtStr}</span>${del}</span></div>`;
    }).join('');
    const dayT=exps.reduce((s,e)=>s+toEUR(e.amount,e.cur),0);
    const totalRow=exps.length?`<div class="exp-total"><span>Summe</span><span>EUR ${fmt(dayT)}</span></div>`:'';
    const addBtn=editMode?`<button class="exp-add" onclick="addDayExpense('${iso}')">+ Ausgabe erfassen</button>`:'';
    expHTML=`<div class="day-exp-section"><div class="day-exp-title">💶 Ausgaben vor Ort</div>${rows}${totalRow}${addBtn}</div>`;
  }

  document.getElementById('day-card-wrap').innerHTML=
    '<div class="day-card">'
    +`<div class="day-card-header"><div class="day-card-date">${dateLabel}</div><div class="day-card-loc">📍 ${esc(loc)}</div></div>`
    +(photoHTML?`<div class="photo-strip"><div class="photo-strip-label">📸 Fotos</div>${photoHTML}</div>`:'')
    +`<div class="day-entry-area">${entryHTML}${expHTML}</div>`
    +(badges?`<div class="day-program">${badges}</div>`:'')
    +'</div>';
}
function slideDay(dir){const days=buildDays();const n=currentDay+dir;if(n<0||n>=days.length)return;currentDay=n;renderTage();}
function goToDay(i){currentDay=i;renderTage();}

async function handlePhotos(event,iso){
  if(!editMode)return;
  const files=Array.from(event.target.files);if(!files.length)return;
  if(!Array.isArray(photos[iso]))photos[iso]=[];
  toast('Lade '+files.length+' Foto(s) hoch…');
  let ok=0;
  for(const f of files){
    const url=await sbUploadPhoto(iso,f);
    if(url){photos[iso].push(url);ok++;}
  }
  if(!photoMeta[iso])photoMeta[iso]={order:[],captions:{}};
  photoMeta[iso].order=photos[iso].slice();
  await sbSavePhotoMeta(iso);
  renderTage();
  toast(ok+' Foto(s) gespeichert!');
}
async function delPhoto(iso,idx){
  if(!editMode)return;
  if(!confirm('Foto löschen?'))return;
  const arr=photos[iso]||[];const url=arr[idx];if(!url)return;
  await sbDeletePhoto(url);
  arr.splice(idx,1);
  // Meta aufräumen: URL aus Reihenfolge und Captions entfernen
  if(photoMeta[iso]){
    if(photoMeta[iso].order)photoMeta[iso].order=arr.slice();
    if(photoMeta[iso].captions)delete photoMeta[iso].captions[url];
    await sbSavePhotoMeta(iso);
  }
  renderTage();toast('Foto gelöscht.');
}
async function movePhoto(iso,idx,dir){
  if(!editMode)return;
  const arr=photos[iso]||[];const ni=idx+dir;
  if(ni<0||ni>=arr.length)return;
  const tmp=arr[idx];arr[idx]=arr[ni];arr[ni]=tmp;
  if(!photoMeta[iso])photoMeta[iso]={order:[],captions:{}};
  photoMeta[iso].order=arr.slice();
  await sbSavePhotoMeta(iso);
  renderTage();
}
function openCaption(iso,idx){

function openLightbox(iso,idx){

function renderFXSettings(){
  const box=document.getElementById('fx-settings');
  if(!box)return;
  if(!editMode){box.innerHTML='';return;}
  // Währungen, die in dieser Reise tatsächlich genutzt werden (außer EUR)
  const used={};
  costs.forEach(c=>{if(c.cur&&c.cur!=='EUR')used[c.cur]=true;});
  Object.keys(dayExpenses).forEach(iso=>dayExpenses[iso].forEach(e=>{if(e.cur&&e.cur!=='EUR')used[e.cur]=true;}));
  const curs=Object.keys(used);
  if(!curs.length){box.innerHTML='<div style="font-size:.76rem;color:var(--fog);padding:8px 0">💱 Sobald du Fremdwährungen nutzt, kannst du hier die Wechselkurse anpassen.</div>';return;}
  let html='<div class="fx-box"><div class="fx-title">💱 Wechselkurse (1 Einheit = € )</div>';
  curs.forEach(cur=>{
    html+=`<div class="fx-row"><span class="fx-cur">${cur}</span>`
      +`<input type="number" step="0.0001" min="0" id="fx-input-${cur}" value="${FX[cur]||''}">`
      +`<button class="fx-save" onclick="saveFxRate('${cur}')">✓</button></div>`;
  });
  html+='</div>';
  box.innerHTML=html;
}
function saveFxRate(cur){
  const inp=document.getElementById('fx-input-'+cur);if(!inp)return;

// ── KOSTEN UI ─────────────────────────────────────────────────────────────────
function renderCosts(){
  const pc=editMode?'':'price-blur';
  let total=0,html='';
  PLAN_CATS.forEach(function(cat){
    const items=costs.filter(c=>c.cat===cat.key);
    if(!items.length && !editMode) return;
    html+=`<div class="cost-section-title">${cat.emoji} ${cat.label}</div>`;
    let sum=0;
    items.forEach(function(c){
      const eur=toEUR(c.amount,c.cur);sum+=eur;total+=eur;
      const amtStr=(c.cur!=='EUR')?`${fmt(c.amount)} ${c.cur} <span style="color:var(--fog);font-weight:400">≈ EUR ${fmt(eur)}</span>`:`EUR ${fmt(eur)}`;
      const dateChip=c.datum?`<div class="date-chip">📅 ${new Date(c.datum+'T12:00:00').toLocaleDateString('de-DE',{day:'numeric',month:'short'})}</div>`:'';
      const btns=editMode?`<button class="cost-edit-btn" data-id="${c.id}" onclick="editCostEl(this)">✏️</button><button class="cost-del-btn" data-id="${c.id}" onclick="delCostEl(this)">✕</button>`:'';
      html+=`<div class="cost-row"><div style="flex:1"><div>${esc(c.label)}</div>${c.info?`<div class="info">${esc(c.info)}</div>`:''}${dateChip}</div><div style="display:flex;align-items:center;gap:8px"><span class="${pc}">${amtStr}</span>${btns}</div></div>`;
    });
    if(editMode)html+=`<button class="cost-add-btn" onclick="addCost('${cat.key}')">+ Position in ${cat.label} hinzufügen</button>`;
    if(items.length)html+=`<div class="cost-group-total"><span>Summe ${cat.label}</span><span class="${pc}">EUR ${fmt(sum)}</span></div>`;
  });
  // ── Tagesausgaben vor Ort ──
  let tag=0,tagHtml='';
  Object.keys(dayExpenses).sort().forEach(function(iso){
    const list=dayExpenses[iso];if(!list||!list.length)return;
    const d=new Date(iso+'T12:00:00');
    const dl=d.toLocaleDateString('de-DE',{weekday:'short',day:'numeric',month:'short'});
    const dayT=list.reduce((s,e)=>s+toEUR(e.amount,e.cur),0);
    tagHtml+=`<div class="cost-row" style="font-weight:600"><div>${dl}</div><div class="${pc}">EUR ${fmt(dayT)}</div></div>`;
    list.forEach(function(e){const amtStr=(e.cur!=='EUR')?`${fmt(e.amount)} ${e.cur}`:`EUR ${fmt(e.amount)}`;tagHtml+=`<div class="cost-row" style="padding-left:14px;font-size:.8rem"><div>${e.cat} ${esc(e.label)}</div><div class="${pc}">${amtStr}</div></div>`;tag+=toEUR(e.amount,e.cur);});
  });
  if(tag>0){
    html+='<div class="cost-section-title">💶 Tagesausgaben vor Ort</div>'+tagHtml;
    total+=tag;
    html+=`<div class="cost-group-total"><span>Summe Tagesausgaben</span><span class="${pc}">EUR ${fmt(tag)}</span></div>`;
  }
  renderFXSettings();
  if(!costs.length && !tag && !editMode){
    html='<div class="empty"><div class="big">💰</div><div class="lbl">Noch keine Kosten erfasst</div><div class="sub">Aktiviere den Admin-Modus, um Positionen hinzuzufügen.</div></div>';
    document.getElementById('cost-list').innerHTML=html;
    document.getElementById('grand-total-box').innerHTML='';
    return;
  }
  document.getElementById('cost-list').innerHTML=html;
  document.getElementById('grand-total-box').innerHTML=`<div class="grand-total"><span>Gesamtkosten</span><span class="${pc}">EUR ${fmt(total)}</span></div>`;
}
function addCost(catKey){

  _editId=null;

  setVal('c-cat',catKey||'Sonstiges');setVal('c-datum','');setVal('c-label','');
  setVal('c-info','');setVal('c-amount','');setVal('c-currency','EUR');

async function saveCost(){
  const cat=val('c-cat'),label=val('c-label').trim(),info=val('c-info').trim();
  const datum=val('c-datum')||'';
  const amt=parseFloat((val('c-amount')||'').replace(',','.'));
  const cur=val('c-currency');
  if(!label){toast('Bitte eine Bezeichnung eingeben.');return;}
  if(isNaN(amt)||amt<=0){toast('Ungültiger Betrag.');return;}
  if(_editId){
    const c={id:_editId,cat,label,info,datum,amount:amt,cur};
    const ok=await sbUpdateCost(c);if(!ok)return;
    const i=costs.findIndex(x=>String(x.id)===String(_editId));if(i>=0)costs[i]=c;
    toast('Position aktualisiert!');
  }else{
    const draft={cat,label,info,datum,amount:amt,cur};
    const id=await sbSaveCost(draft);if(id===null)return;
    costs.push(Object.assign({id:id},draft));
    toast('Position hinzugefügt!');

  document.getElementById('cost-modal').classList.remove('open');
  renderCosts();renderHead();buildDaySlides();
}

  document.getElementById('section-'+tab).classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
  if(tab==='kosten')renderCosts();
  if(tab==='tage')renderTage();
}
function buildDaySlides(){renderTage();}

// ── ADMIN / PIN ─────────────────────────────────────────────────────────────
function toggleAdmin(){
  if(editMode){
    editMode=false;
    document.getElementById('admin-btn').textContent='🔑 Admin';
    document.getElementById('admin-btn').style.background='';
    renderHead();renderCosts();renderTage();
    toast('Admin-Modus beendet.');
  }else{
    pinBuffer='';updatePinDots();
    document.getElementById('pin-err').textContent='';
    document.getElementById('pin-overlay').classList.add('open');
  }
}
function pinIn(d){if(pinBuffer.length>=4)return;pinBuffer+=d;updatePinDots();if(pinBuffer.length===4)setTimeout(checkPin,150);}
function pinDel(){pinBuffer=pinBuffer.slice(0,-1);updatePinDots();}
function updatePinDots(){for(var i=0;i<4;i++)document.getElementById('pd'+i).classList.toggle('filled',i<pinBuffer.length);}
function closePin(){document.getElementById('pin-overlay').classList.remove('open');pinBuffer='';updatePinDots();}
function checkPin(){
  if(pinBuffer===CORRECT_PIN){
    closePin();editMode=true;
    document.getElementById('admin-btn').textContent='Admin aktiv';
    document.getElementById('admin-btn').style.background='var(--sunset)';
    renderHead();renderCosts();renderTage();
    toast('Admin-Modus aktiv!');
  }else{
    document.getElementById('pin-err').textContent='Falsche PIN.';
    pinBuffer='';updatePinDots();
    setTimeout(function(){document.getElementById('pin-err').textContent='';},2000);
  }
}

// ── INIT ────────────────────────────────────────────────────────────────────
async function init(){
  if(!REISE){
    document.getElementById('hero-eyebrow').textContent='Hinweis';
    document.getElementById('hero-title').innerHTML='Keine Reise ausgewählt';
    document.getElementById('hero-sub').innerHTML='Diese Seite wird über die Startseite mit einer Reise geöffnet. Bitte kehre zur <a href="index.html" style="color:var(--sunset)">Übersicht</a> zurück und wähle oder erstelle eine Reise.';
  }
  try{await sbLoadHead();}catch(e){console.error(e);}
  try{await sbLoadFX();}catch(e){console.error(e);}
  try{await sbLoadCosts();}catch(e){console.error(e);}
  try{await sbLoadExpenses();}catch(e){console.error(e);}
  try{await sbLoadEntries();}catch(e){console.error(e);}
  try{await sbLoadPhotoMeta();}catch(e){console.error(e);}
  renderHead();renderTage();
}
init();
</script>
